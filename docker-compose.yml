services:
  postgres:
    image: postgres:15-alpine
    container_name: eksamenprep_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eksamenprep_db
      POSTGRES_USER: eksamenprep_user
      POSTGRES_PASSWORD: eksamenprep_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "eksamenprep_user", "-d", "eksamenprep_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eksamenprep_network

  backend:
    build: ./backend
    container_name: eksamenprep_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: eksamenprep_user
      DB_PASSWORD: eksamenprep_password
      DB_NAME: eksamenprep_db
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      REGISTRATION_KEY: exam2026
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - eksamenprep_network

  frontend:
    image: nginx:alpine
    container_name: eksamenprep_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - eksamenprep_network

volumes:
  postgres_data:

networks:
  eksamenprep_network:
    driver: bridge
