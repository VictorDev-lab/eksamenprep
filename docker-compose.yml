services:
  mysql:
    image: mysql:8.0
    container_name: eksamenprep_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: eksamenprep_db
      MYSQL_USER: eksamenprep_user
      MYSQL_PASSWORD: eksamenprep_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3308:3306"   # ⬅️ Changed from 3307 → 3308
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eksamenprep_network

  backend:
    build: ./backend
    container_name: eksamenprep_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: eksamenprep_user
      DB_PASSWORD: eksamenprep_password
      DB_NAME: eksamenprep_db
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      REGISTRATION_KEY: exam2026
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - eksamenprep_network

  frontend:
    image: nginx:alpine
    container_name: eksamenprep_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - eksamenprep_network

volumes:
  mysql_data:

networks:
  eksamenprep_network:
    driver: bridge
