<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EksamenPrep</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        body {
            background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: fadeIn 0.6s ease;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: 700;
            animation: float 3s ease-in-out infinite;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 5px;
            gap: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .tab:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            animation: fadeIn 0.3s ease;
            font-weight: 500;
        }

        .success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
        }

        .error {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(235, 51, 73, 0.3);
        }

        .hidden {
            display: none;
        }

        .profile {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px solid rgba(102, 126, 234, 0.2);
        }

        .profile h3 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 24px;
        }

        .profile p {
            margin-bottom: 10px;
            color: #555;
        }

        .logout-btn {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            margin-top: 10px;
        }

        .logout-btn:hover {
            box-shadow: 0 6px 20px rgba(235, 51, 73, 0.5);
        }

        label {
            font-weight: 500;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 EksamenPrep</h1>
        <p class="subtitle">Your Gateway to Success</p>

        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Login</div>
            <div class="tab" onclick="showTab('register')">Register</div>
            <div class="tab" onclick="showTab('profile')">Profile</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="student@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button onclick="login()">Login</button>
            <div id="loginMessage" class="message hidden"></div>
        </div>

        <!-- Registration Form -->
        <div id="registerForm" class="form-container">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="student@example.com">
            </div>
            <div class="form-group">
                <label>Password (min. 6 characters)</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Registration Key</label>
                <input type="text" id="regKey" placeholder="exam2025">
            </div>
            <button onclick="register()">Register</button>
            <div id="registerMessage" class="message hidden"></div>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" class="form-container">
            <div id="profileContent" class="profile">
                <h3>User Profile</h3>
                <p>Please login to view your profile</p>
            </div>
            <a href="store.html" style="display: block; text-align: center; margin-bottom: 15px; padding: 14px; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; text-decoration: none; border-radius: 10px; font-weight: 600; box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4); transition: all 0.3s ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(17, 153, 142, 0.6)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(17, 153, 142, 0.4)'">🛒 Visit Store</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
            <div id="profileMessage" class="message hidden"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentToken = localStorage.getItem('token');

        // Tab switching
        function showTab(tabName) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Show selected form
            document.querySelectorAll('.form-container').forEach(form => {
                form.classList.remove('active');
            });
            const formId = tabName === 'profile' ? 'Section' : 'Form';
            document.getElementById(tabName + formId).classList.add('active');

            // Load profile if on profile tab and logged in
            if (tabName === 'profile' && currentToken) {
                fetchProfile();
            }
        }

        // Show message
        function showMessage(elementId, text, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = text;
            element.className = `message ${isError ? 'error' : 'success'}`;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 5000);
        }

        // Login function
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('loginMessage', 'Please fill in all fields', true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentToken = data.token;
                    localStorage.setItem('token', data.token);
                    showMessage('loginMessage', 'Login successful!');
                    showTab('profile');
                } else {
                    showMessage('loginMessage', data.error || 'Login failed', true);
                }
            } catch (error) {
                showMessage('loginMessage', 'Network error', true);
            }
        }

        // Register function
        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const regKey = document.getElementById('regKey').value;

            if (!name || !email || !password || !regKey) {
                showMessage('registerMessage', 'Please fill in all fields', true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-registration-key': regKey
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('registerMessage', 'Registration successful! Please login.');
                    // Clear form
                    document.getElementById('regName').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regKey').value = '';
                    showTab('login');
                } else {
                    showMessage('registerMessage', data.error || 'Registration failed', true);
                }
            } catch (error) {
                showMessage('registerMessage', 'Network error', true);
            }
        }

        // Fetch profile
        async function fetchProfile() {
            if (!currentToken) {
                document.getElementById('profileContent').innerHTML = `
                    <h3>User Profile</h3>
                    <p>Please login to view your profile</p>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const user = data.user;
                    const date = new Date(user.created_at).toLocaleDateString('no-NO');
                    
                    document.getElementById('profileContent').innerHTML = `
                        <h3>Welcome, ${user.name}!</h3>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>User ID:</strong> ${user.id}</p>
                        <p><strong>Member since:</strong> ${date}</p>
                    `;
                } else if (response.status === 401) {
                    // Token expired
                    localStorage.removeItem('token');
                    currentToken = null;
                    document.getElementById('profileContent').innerHTML = `
                        <h3>User Profile</h3>
                        <p>Session expired. Please login again.</p>
                    `;
                }
            } catch (error) {
                showMessage('profileMessage', 'Error fetching profile', true);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            currentToken = null;
            document.getElementById('profileContent').innerHTML = `
                <h3>User Profile</h3>
                <p>You have been logged out.</p>
            `;
            showTab('login');
        }

        // Check token on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (currentToken) {
                fetchProfile();
            }
        });
    </script>
</body>
</html>
