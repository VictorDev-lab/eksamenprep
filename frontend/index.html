<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksamen</title>
<link rel="stylesheet" href="style.css"></head>
<body class="index-page">
    <div class="container">
        <h1>🎓 Eksamen</h1>
        <p class="subtitle">Your Gateway to Success</p>

        <div class="tabs">
            <div class="tab active" onclick="showTab(this, 'login')">Login</div>
            <div class="tab" onclick="showTab(this, 'register')">Register</div>
            <div class="tab" onclick="showTab(this, 'profile')">Profile</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="student@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button onclick="login()">Login</button>
            <div id="loginMessage" class="message hidden"></div>
        </div>

        <!-- Registration Form -->
        <div id="registerForm" class="form-container">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="student@example.com">
            </div>
            <div class="form-group">
                <label>Password (min. 6 characters)</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Registration Key</label>
                <input type="text" id="regKey" placeholder="exam2026">
            </div>
            <button onclick="register()">Register</button>
            <div id="registerMessage" class="message hidden"></div>
        </div>

        <!-- Profile Section -->
        <div id="profileSection" class="form-container">
            <div id="profileContent" class="profile">
                <h3>User Profile</h3>
                <p>Please login to view your profile</p>
            </div>
            <a href="store.html" class="store-link">🛒 Visit Store</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
            <div id="profileMessage" class="message hidden"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.API_BASE || (window.location.hostname === 'localhost' && window.location.port === '8080'
            ? 'http://localhost:3000/api'
            : '/api');
        let currentToken = localStorage.getItem('token');

        // Tab switching – accepts the clicked tab element and the tab name
        function showTab(clickedTab, tabName) {
            // Update active tab
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            clickedTab.classList.add('active');

            // Show the corresponding form container
            document.querySelectorAll('.form-container').forEach(form => {
                form.classList.remove('active');
            });
            const formId = tabName === 'profile' ? 'profileSection' : tabName + 'Form';
            document.getElementById(formId).classList.add('active');

            // Load profile if on profile tab and logged in
            if (tabName === 'profile' && currentToken) {
                fetchProfile();
            }
        }

        // Show message
        function showMessage(elementId, text, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = text;
            element.className = `message ${isError ? 'error' : 'success'}`;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 5000);
        }

        // Login function
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('loginMessage', 'Please fill in all fields', true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentToken = data.token;
                    localStorage.setItem('token', data.token);
                    showMessage('loginMessage', 'Login successful!');
                    const profileTab = document.querySelector('.tab:nth-child(3)');
                    showTab(profileTab, 'profile');
                } else {
                    showMessage('loginMessage', data.error || 'Login failed', true);
                }
            } catch (error) {
                showMessage('loginMessage', 'Network error', true);
            }
        }

        // Register function
        async function register() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const regKey = document.getElementById('regKey').value;

            if (!name || !email || !password || !regKey) {
                showMessage('registerMessage', 'Please fill in all fields', true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-registration-key': regKey
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('registerMessage', 'Registration successful! Please login.');
                    document.getElementById('regName').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regKey').value = '';
                    const loginTab = document.querySelector('.tab:first-child');
                    showTab(loginTab, 'login');
                } else {
                    showMessage('registerMessage', data.error || 'Registration failed', true);
                }
            } catch (error) {
                showMessage('registerMessage', 'Network error', true);
            }
        }

        // Fetch profile
        async function fetchProfile() {
            if (!currentToken) {
                document.getElementById('profileContent').innerHTML = `
                    <h3>User Profile</h3>
                    <p>Please login to view your profile</p>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const user = data.user;
                    const date = new Date(user.created_at).toLocaleDateString('no-NO');
                    
                    document.getElementById('profileContent').innerHTML = `
                        <h3>Welcome, ${user.name}!</h3>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>User ID:</strong> ${user.id}</p>
                        <p><strong>Member since:</strong> ${date}</p>
                    `;
                } else if (response.status === 401) {
                    localStorage.removeItem('token');
                    currentToken = null;
                    document.getElementById('profileContent').innerHTML = `
                        <h3>User Profile</h3>
                        <p>Session expired. Please login again.</p>
                    `;
                }
            } catch (error) {
                showMessage('profileMessage', 'Error fetching profile', true);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            currentToken = null;
            document.getElementById('profileContent').innerHTML = `
                <h3>User Profile</h3>
                <p>You have been logged out.</p>
            `;
            const loginTab = document.querySelector('.tab:first-child');
            showTab(loginTab, 'login');
        }

        // Check token on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (currentToken) {
                fetchProfile();
            }
        });
    </script>
</body>
</html>
