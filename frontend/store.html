<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - Eksamen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>🛒 Eksamen Store</h1>
            <div class="header-nav">
                <span id="userGreeting"></span>
                <a href="index.html" class="nav-link">Home</a>
                <button class="nav-link" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showSection(this, 'products')">Products</button>
            <button class="tab" onclick="showSection(this, 'cart')">
                Cart <span id="cartBadge" class="cart-badge hidden">0</span>
            </button>
            <button class="tab" onclick="showSection(this, 'orders')">My Orders</button>
        </div>

        <div id="message" class="message hidden"></div>

        <!-- Products Section -->
        <div id="productsSection" class="section active">
            <div id="productsGrid" class="products-grid"></div>
        </div>

        <!-- Cart Section -->
        <div id="cartSection" class="section">
            <div id="cartItems"></div>
            <div id="cartSummary" class="cart-summary hidden">
                <div class="cart-total">Total: <span id="cartTotal">0.00</span> NOK</div>
                <button class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </div>

        <!-- Orders Section -->
        <div id="ordersSection" class="section">
            <div id="ordersList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentToken = localStorage.getItem('token');

        // Check if user is logged in
        if (!currentToken) {
            window.location.href = 'index.html';
        }

        // Show message
        function showMessage(text, isError = false) {
            const element = document.getElementById('message');
            element.textContent = text;
            element.className = `message ${isError ? 'error' : 'success'}`;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 5000);
        }

        // Show section – receives the clicked tab and the section name
        function showSection(clickedTab, section) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));

            clickedTab.classList.add('active');
            document.getElementById(section + 'Section').classList.add('active');

            if (section === 'products') loadProducts();
            if (section === 'cart') loadCart();
            if (section === 'orders') loadOrders();
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/store/products`);
                const data = await response.json();

                const grid = document.getElementById('productsGrid');
                
                if (data.products.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No products available</div>';
                    return;
                }

                grid.innerHTML = data.products.map(product => `
                    <div class="product-card">
                        <img src="${product.image_url}" alt="${product.name}" class="product-image" loading="lazy">
                        <div class="product-info">
                            <div class="product-category">${product.category}</div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-description">${product.description}</div>
                            <div class="product-footer">
                                <div class="product-price">${product.price} NOK</div>
                                <button class="btn-add-cart" onclick="addToCart(${product.id})">
                                    🛒 Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('Failed to load products', true);
            }
        }

        // Add to cart
        async function addToCart(productId) {
            try {
                const response = await fetch(`${API_BASE}/store/cart`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ productId, quantity: 1 })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Added to cart!');
                    updateCartBadge();
                } else {
                    showMessage(data.error || 'Failed to add to cart', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Load cart
        async function loadCart() {
            try {
                const response = await fetch(`${API_BASE}/store/cart`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                const container = document.getElementById('cartItems');
                const summary = document.getElementById('cartSummary');

                if (data.items.length === 0) {
                    container.innerHTML = '<div class="empty-message">Your cart is empty</div>';
                    summary.classList.add('hidden');
                    return;
                }

                container.innerHTML = data.items.map(item => `
                    <div class="cart-item">
                        <img src="${item.image_url}" alt="${item.name}">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} NOK</div>
                        </div>
                        <div class="cart-item-controls">
                            <input type="number" class="quantity-input" value="${item.quantity}" 
                                   min="1" onchange="updateQuantity(${item.id}, this.value)">
                            <button class="btn-remove" onclick="removeFromCart(${item.id})">Remove</button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('cartTotal').textContent = data.total.toFixed(2);
                summary.classList.remove('hidden');
                updateCartBadge();
            } catch (error) {
                showMessage('Failed to load cart', true);
            }
        }

        // Update quantity
        async function updateQuantity(itemId, quantity) {
            try {
                const response = await fetch(`${API_BASE}/store/cart/${itemId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ quantity: parseInt(quantity) })
                });

                if (response.ok) {
                    loadCart();
                } else {
                    showMessage('Failed to update quantity', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Remove from cart
        async function removeFromCart(itemId) {
            try {
                const response = await fetch(`${API_BASE}/store/cart/${itemId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.ok) {
                    showMessage('Removed from cart');
                    loadCart();
                } else {
                    showMessage('Failed to remove item', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Checkout
        async function checkout() {
            if (!confirm('Proceed with checkout?')) return;

            try {
                const response = await fetch(`${API_BASE}/store/checkout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`Order placed! Total: ${data.total} NOK`);
                    loadCart();
                    updateCartBadge();
                } else {
                    showMessage(data.error || 'Checkout failed', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/store/orders`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                const container = document.getElementById('ordersList');

                if (data.orders.length === 0) {
                    container.innerHTML = '<div class="empty-message">No orders yet</div>';
                    return;
                }

                container.innerHTML = data.orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <strong>Order #${order.id}</strong><br>
                                <small>${new Date(order.created_at).toLocaleDateString('no-NO')}</small>
                            </div>
                            <div>
                                <span class="order-status status-${order.status}">${order.status.toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    ${item.quantity}x ${item.name} - ${item.price} NOK
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-top: 10px; font-weight: bold; color: #28a745;">
                            Total: ${order.total_amount} NOK
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('Failed to load orders', true);
            }
        }

        // Update cart badge
        async function updateCartBadge() {
            try {
                const response = await fetch(`${API_BASE}/store/cart`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                const badge = document.getElementById('cartBadge');
                
                if (data.items.length > 0) {
                    badge.textContent = data.items.length;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            } catch (error) {
                console.error('Failed to update cart badge');
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        // Get user profile for greeting
        async function loadUserProfile() {
            try {
                const response = await fetch(`${API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userGreeting').textContent = `Welcome, ${data.user.name}!`;
                }
            } catch (error) {
                console.error('Failed to load profile');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartBadge();
            loadUserProfile();
        });
    </script>
</body>
</html>
