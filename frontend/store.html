<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - EksamenPrep</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
        }

        .header {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .header-nav {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-link {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .nav-link:hover {
            background: #0056b3;
        }

        .cart-badge {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            margin-left: 5px;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 16px;
        }

        .tab.active {
            background: #007bff;
            color: white;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            padding: 15px;
            position: relative;
        }

        .product-category {
            position: absolute;
            top: -30px;
            right: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }

        .product-name {
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2c3e50;
            line-height: 1.3;
        }

        .product-description {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.5;
            min-height: 42px;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .product-price {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn-add-cart {
            padding: 8px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-add-cart:hover {
            background: #0056b3;
        }

        .cart-item, .order-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .cart-item {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: #28a745;
            font-weight: bold;
        }

        .cart-item-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .quantity-input {
            width: 60px;
            padding: 5px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .btn-remove {
            padding: 5px 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .cart-summary {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .cart-total {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .btn-checkout {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-checkout:hover {
            background: #218838;
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .order-status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .order-items {
            margin-top: 10px;
        }

        .order-item {
            padding: 5px 0;
            color: #666;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <h1>🛒 EksamenPrep Store</h1>
            <div class="header-nav">
                <span id="userGreeting"></span>
                <a href="index.html" class="nav-link">Home</a>
                <button class="nav-link" onclick="logout()">Logout</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="showSection('products')">Products</button>
            <button class="tab" onclick="showSection('cart')">
                Cart <span id="cartBadge" class="cart-badge hidden">0</span>
            </button>
            <button class="tab" onclick="showSection('orders')">My Orders</button>
        </div>

        <div id="message" class="message hidden"></div>

        <!-- Products Section -->
        <div id="productsSection" class="section active">
            <div id="productsGrid" class="products-grid"></div>
        </div>

        <!-- Cart Section -->
        <div id="cartSection" class="section">
            <div id="cartItems"></div>
            <div id="cartSummary" class="cart-summary hidden">
                <div class="cart-total">Total: <span id="cartTotal">0.00</span> NOK</div>
                <button class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
            </div>
        </div>

        <!-- Orders Section -->
        <div id="ordersSection" class="section">
            <div id="ordersList"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000/api';
        let currentToken = localStorage.getItem('token');
        let cartCount = 0;

        // Check if user is logged in
        if (!currentToken) {
            window.location.href = 'index.html';
        }

        // Show message
        function showMessage(text, isError = false) {
            const element = document.getElementById('message');
            element.textContent = text;
            element.className = `message ${isError ? 'error' : 'success'}`;
            element.classList.remove('hidden');
            setTimeout(() => element.classList.add('hidden'), 5000);
        }

        // Show section
        function showSection(section) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(section + 'Section').classList.add('active');

            if (section === 'products') loadProducts();
            if (section === 'cart') loadCart();
            if (section === 'orders') loadOrders();
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/store/products`);
                const data = await response.json();

                const grid = document.getElementById('productsGrid');
                
                if (data.products.length === 0) {
                    grid.innerHTML = '<div class="empty-message">No products available</div>';
                    return;
                }

                grid.innerHTML = data.products.map(product => `
                    <div class="product-card">
                        <img src="${product.image_url}" alt="${product.name}" class="product-image" loading="lazy">
                        <div class="product-info">
                            <div class="product-category">${product.category}</div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-description">${product.description}</div>
                            <div class="product-footer">
                                <div class="product-price">${product.price} NOK</div>
                                <button class="btn-add-cart" onclick="addToCart(${product.id})">
                                    🛒 Add to Cart
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('Failed to load products', true);
            }
        }

        // Add to cart
        async function addToCart(productId) {
            try {
                const response = await fetch(`${API_BASE}/store/cart`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ productId, quantity: 1 })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('Added to cart!');
                    updateCartBadge();
                } else {
                    showMessage(data.error || 'Failed to add to cart', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Load cart
        async function loadCart() {
            try {
                const response = await fetch(`${API_BASE}/store/cart`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                const container = document.getElementById('cartItems');
                const summary = document.getElementById('cartSummary');

                if (data.items.length === 0) {
                    container.innerHTML = '<div class="empty-message">Your cart is empty</div>';
                    summary.classList.add('hidden');
                    return;
                }

                container.innerHTML = data.items.map(item => `
                    <div class="cart-item">
                        <img src="${item.image_url}" alt="${item.name}">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} NOK</div>
                        </div>
                        <div class="cart-item-controls">
                            <input type="number" class="quantity-input" value="${item.quantity}" 
                                   min="1" onchange="updateQuantity(${item.id}, this.value)">
                            <button class="btn-remove" onclick="removeFromCart(${item.id})">Remove</button>
                        </div>
                    </div>
                `).join('');

                document.getElementById('cartTotal').textContent = data.total.toFixed(2);
                summary.classList.remove('hidden');
                updateCartBadge();
            } catch (error) {
                showMessage('Failed to load cart', true);
            }
        }

        // Update quantity
        async function updateQuantity(itemId, quantity) {
            try {
                const response = await fetch(`${API_BASE}/store/cart/${itemId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ quantity: parseInt(quantity) })
                });

                if (response.ok) {
                    loadCart();
                } else {
                    showMessage('Failed to update quantity', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Remove from cart
        async function removeFromCart(itemId) {
            try {
                const response = await fetch(`${API_BASE}/store/cart/${itemId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.ok) {
                    showMessage('Removed from cart');
                    loadCart();
                } else {
                    showMessage('Failed to remove item', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Checkout
        async function checkout() {
            if (!confirm('Proceed with checkout?')) return;

            try {
                const response = await fetch(`${API_BASE}/store/checkout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(`Order placed! Total: ${data.total} NOK`);
                    loadCart();
                    updateCartBadge();
                } else {
                    showMessage(data.error || 'Checkout failed', true);
                }
            } catch (error) {
                showMessage('Network error', true);
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/store/orders`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                const container = document.getElementById('ordersList');

                if (data.orders.length === 0) {
                    container.innerHTML = '<div class="empty-message">No orders yet</div>';
                    return;
                }

                container.innerHTML = data.orders.map(order => `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <strong>Order #${order.id}</strong><br>
                                <small>${new Date(order.created_at).toLocaleDateString('no-NO')}</small>
                            </div>
                            <div>
                                <span class="order-status status-${order.status}">${order.status.toUpperCase()}</span>
                            </div>
                        </div>
                        <div class="order-items">
                            ${order.items.map(item => `
                                <div class="order-item">
                                    ${item.quantity}x ${item.name} - ${item.price} NOK
                                </div>
                            `).join('')}
                        </div>
                        <div style="margin-top: 10px; font-weight: bold; color: #28a745;">
                            Total: ${order.total_amount} NOK
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                showMessage('Failed to load orders', true);
            }
        }

        // Update cart badge
        async function updateCartBadge() {
            try {
                const response = await fetch(`${API_BASE}/store/cart`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                const data = await response.json();
                const badge = document.getElementById('cartBadge');
                
                if (data.items.length > 0) {
                    badge.textContent = data.items.length;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }
            } catch (error) {
                console.error('Failed to update cart badge');
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        // Get user profile for greeting
        async function loadUserProfile() {
            try {
                const response = await fetch(`${API_BASE}/profile`, {
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('userGreeting').textContent = `Welcome, ${data.user.name}!`;
                }
            } catch (error) {
                console.error('Failed to load profile');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            updateCartBadge();
            loadUserProfile();
        });
    </script>
</body>
</html>
